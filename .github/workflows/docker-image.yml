name: docker-image

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    environment: packaging
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout client
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: SyncClient/Dockerfile
          build-args: |
            GH_NUGET_TOKEN=${{ secrets.GH_TOKEN }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/quocchungthan/client:${{ github.sha }}
            ghcr.io/quocchungthan/client:latest
